name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"
          # elixir-version: "1"

      - name: Download deps
        run: gleam deps download

      - name: Run tests
        run: gleam test

      - name: Check formatting
        run: gleam format --check src test
